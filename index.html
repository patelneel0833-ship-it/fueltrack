<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FuelTrack"/>
<meta name="theme-color" content="#020617"/>
<title>FuelTrack</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#020617;font-family:'DM Sans',-apple-system,sans-serif;color:#f1f5f9;overflow-x:hidden;}
:root{--bg:#020617;--card:rgba(15,23,42,0.85);--border:rgba(255,255,255,0.08);--text:#f1f5f9;--sub:#64748b;--accent:#6366f1;--orange:#f97316;--cyan:#22d3ee;--purple:#a78bfa;--pink:#fb7185;--green:#34d399;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(99,102,241,0.3);border-radius:99px;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}

/* Layout */
#app{min-height:100vh;background:radial-gradient(ellipse at 20% 0%,#1e1b4b 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,#0c1a2e 0%,transparent 50%),#020617;padding-bottom:80px;}

/* Header */
.header{position:sticky;top:0;z-index:100;background:rgba(2,6,23,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-weight:800;font-size:20px;letter-spacing:-0.03em;}
.logo span:first-child{background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-date{color:#334155;font-size:11px;font-weight:500;margin-top:2px;}
.header-right{display:flex;align-items:center;gap:10px;}
.streak-badge{background:rgba(249,115,22,0.15);border:1px solid rgba(249,115,22,0.3);border-radius:99px;padding:4px 10px;display:flex;align-items:center;gap:4px;color:#f97316;font-size:12px;font-weight:700;}
.add-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:12px;width:38px;height:38px;color:white;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(99,102,241,0.5);line-height:1;}

/* Content */
.content{max-width:540px;margin:0 auto;padding:16px 14px 0;}

/* Tabs */
.tab-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(2,6,23,0.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-around;padding:8px 0 20px;}
.tab-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px 2px;position:relative;}
.tab-btn.active::before{content:’’;position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:20px;height:3px;background:linear-gradient(90deg,#6366f1,#a78bfa);border-radius:99px;}
.tab-icon{font-size:17px;}
.tab-label{font-size:10px;font-weight:600;color:#334155;font-family:inherit;}
.tab-btn.active .tab-label{color:#a5b4fc;}
.tab-btn:not(.active) .tab-icon{filter:grayscale(1) opacity(0.45);}

/* Cards */
.card{background:rgba(15,23,42,0.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:18px;margin-bottom:12px;}
.card-title{color:#f1f5f9;font-weight:700;font-size:15px;margin-bottom:14px;}

/* Inputs */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.field label{color:#94a3b8;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;}
.field-wrap{position:relative;display:flex;align-items:center;}
.field input,.field select{width:100%;background:rgba(30,41,59,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px 14px;color:#f1f5f9;font-size:15px;outline:none;font-family:inherit;transition:border-color 0.2s;-webkit-appearance:none;}
.field input:focus,.field select:focus{border-color:rgba(99,102,241,0.8);}
.field .unit{position:absolute;right:12px;color:#475569;font-size:12px;font-weight:600;pointer-events:none;}
.field select{cursor:pointer;}

/* Grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* Buttons */
.btn{border:none;border-radius:12px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;letter-spacing:0.01em;}
.btn:active{transform:scale(0.96);}
.btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;box-shadow:0 4px 14px rgba(99,102,241,0.4);}
.btn-orange{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;box-shadow:0 4px 14px rgba(249,115,22,0.4);}
.btn-success{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 4px 14px rgba(16,185,129,0.3);}
.btn-ghost{background:rgba(255,255,255,0.05);color:#94a3b8;border:1px solid rgba(255,255,255,0.08)!important;}
.btn-danger{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3)!important;}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:10px;}
.btn-block{width:100%;padding:13px;}
.btn:disabled{background:rgba(255,255,255,0.05);color:#475569;box-shadow:none;cursor:not-allowed;}

/* Progress bar */
.progress-wrap{background:#1e293b;border-radius:99px;overflow:hidden;}
.progress-bar{height:100%;border-radius:99px;transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1);}

/* Macro pills */
.macro-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
.macro-pill{border-radius:10px;padding:6px 12px;display:flex;flex-direction:column;align-items:center;min-width:64px;}
.macro-val{font-size:15px;font-weight:700;}
.macro-label{font-size:11px;font-weight:500;color:#64748b;margin-top:1px;}

/* Meal section */
.meal-section{margin-bottom:0;}
.meal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.meal-name{color:#f1f5f9;font-weight:700;font-size:15px;}
.meal-meta{color:#475569;font-size:12px;margin-top:2px;}

/* Food item */
.food-item{background:rgba(30,41,59,0.4);border-radius:12px;padding:10px 12px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.food-name{color:#e2e8f0;font-weight:600;font-size:14px;}
.food-macros{display:flex;gap:8px;margin-top:3px;flex-wrap:wrap;}
.food-kcal{color:#f97316;font-size:12px;font-weight:700;}
.food-macro{color:#475569;font-size:12px;}
.food-actions{display:flex;gap:4px;flex-shrink:0;}

/* Meal pills */
.meal-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.meal-pill{padding:6px 14px;border-radius:99px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:inherit;}
.meal-pill.active{background:rgba(99,102,241,0.3);color:#a5b4fc;}
.meal-pill:not(.active){background:rgba(30,41,59,0.6);color:#64748b;}

/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(2,6,23,0.88);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:flex-end;justify-content:center;}
.modal{background:rgba(13,20,38,0.99);border:1px solid rgba(255,255,255,0.1);border-radius:24px 24px 0 0;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 -20px 60px rgba(0,0,0,0.7);animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);}
.modal-handle{display:flex;justify-content:center;padding:12px 0 0;}
.modal-handle-bar{width:40px;height:4px;background:rgba(255,255,255,0.15);border-radius:99px;}
.modal-header{padding:16px 20px 0;display:flex;align-items:center;justify-content:space-between;}
.modal-title{color:#f1f5f9;font-size:18px;font-weight:700;}
.modal-close{background:rgba(255,255,255,0.08);border:none;color:#94a3b8;cursor:pointer;font-size:16px;width:30px;height:30px;border-radius:99px;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.modal-body{padding:18px 20px 30px;}

/* Mode toggle */
.mode-toggle{display:flex;background:rgba(30,41,59,0.6);border-radius:12px;padding:4px;gap:4px;margin-bottom:14px;}
.mode-btn{flex:1;padding:8px;border-radius:9px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:inherit;}
.mode-btn.active{background:rgba(99,102,241,0.3);color:#a5b4fc;}
.mode-btn:not(.active){background:transparent;color:#475569;}

/* Insight */
.insight{border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.insight-icon{font-size:16px;}
.insight-text{font-size:13px;font-weight:500;}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-card{background:rgba(15,23,42,0.8);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:14px 16px;}
.stat-label{color:#64748b;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;}
.stat-value{font-size:24px;font-weight:800;margin-top:6px;}
.stat-unit{font-size:12px;color:#475569;font-weight:400;}

/* Bar chart */
.bar-chart{display:flex;gap:6px;align-items:flex-end;height:130px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
.bar-val{font-size:10px;color:#f97316;font-weight:700;height:14px;display:flex;align-items:center;}
.bar{width:100%;border-radius:5px 5px 0 0;transition:height 0.5s ease;min-height:4px;}
.bar-day{font-size:11px;color:#475569;font-weight:400;}
.bar-day.today{color:#a5b4fc;font-weight:700;}

/* Search input */
.search-wrap{margin-bottom:12px;}
.search-input{width:100%;background:rgba(30,41,59,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px 14px;color:#f1f5f9;font-size:15px;outline:none;font-family:inherit;}
.search-input:focus{border-color:rgba(99,102,241,0.8);}

/* Saved food item */
.saved-item{background:rgba(15,23,42,0.8);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;}

/* Streak banner */
.streak-banner{background:linear-gradient(135deg,rgba(249,115,22,0.2),rgba(234,88,12,0.1));border:1px solid rgba(249,115,22,0.3);border-radius:16px;padding:12px 18px;display:flex;align-items:center;gap:10px;margin-bottom:12px;}

/* Deficit card */
.deficit-card{background:rgba(34,211,238,0.1);border:1px solid rgba(34,211,238,0.3);border-radius:14px;padding:10px 16px;text-align:center;}
.deficit-card.over{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.3);}

/* Weight history */
.weight-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.05);}

/* Quantity stepper */
.qty-stepper{display:flex;align-items:center;gap:0;background:rgba(30,41,59,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:10px;overflow:hidden;}
.qty-btn{background:none;border:none;color:#a5b4fc;font-size:18px;font-weight:700;cursor:pointer;padding:4px 12px;font-family:inherit;transition:background 0.15s;line-height:1;}
.qty-btn:active{background:rgba(99,102,241,0.2);}
.qty-val{color:#f1f5f9;font-size:15px;font-weight:700;min-width:24px;text-align:center;}

@keyframes slideUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>

</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header">
    <div>
      <div class="logo"><span>Fuel</span><span style="color:#f1f5f9">Track</span></div>
      <div class="logo-date" id="headerDate"></div>
    </div>
    <div class="header-right">
      <div class="streak-badge" id="streakBadge" style="display:none">🔥 <span id="streakNum">0</span></div>
      <button class="add-btn" onclick="openAddModal()">+</button>
    </div>
  </div>

  <!-- Content -->

  <div class="content" id="mainContent"></div>

  <!-- Tab Bar -->

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('dashboard',this)" id="tab-dashboard">
      <span class="tab-icon">⚡</span><span class="tab-label">Dashboard</span>
    </button>
    <button class="tab-btn" onclick="switchTab('log',this)" id="tab-log">
      <span class="tab-icon">📋</span><span class="tab-label">Log</span>
    </button>
    <button class="tab-btn" onclick="switchTab('saved',this)" id="tab-saved">
      <span class="tab-icon">⭐</span><span class="tab-label">Saved</span>
    </button>
    <button class="tab-btn" onclick="switchTab('calc',this)" id="tab-calc">
      <span class="tab-icon">🔢</span><span class="tab-label">Calc</span>
    </button>
    <button class="tab-btn" onclick="switchTab('analytics',this)" id="tab-analytics">
      <span class="tab-icon">📊</span><span class="tab-label">Analytics</span>
    </button>
    <button class="tab-btn" onclick="switchTab('goals',this)" id="tab-goals">
      <span class="tab-icon">🎯</span><span class="tab-label">Goals</span>
    </button>
  </div>
</div>

<!-- Modal Container -->

<div id="modalContainer"></div>

<script>
// ── STATE ──
const S = {
  entries: load('ft_entries', []),
  saved: load('ft_saved', []),
  goals: load('ft_goals', {calories:2000, protein:150}),
  streak: load('ft_streak', 0),
  lastDate: load('ft_lastDate', ''),
  currentTab: 'dashboard',
  modalMeal: 'Breakfast',
};

const DEFAULT_FOODS = [
  {id:'df1',name:'Roti',calories:80,protein:2.5,carbs:15,fats:1.5},
  {id:'df2',name:'Dal Tadka',calories:150,protein:9,carbs:22,fats:3},
  {id:'df3',name:'Paneer Sabji',calories:220,protein:14,carbs:8,fats:15},
  {id:'df4',name:'Whey Protein',calories:120,protein:24,carbs:3,fats:1.5},
  {id:'df5',name:'Lassi',calories:180,protein:6,carbs:28,fats:5},

  {id:'df6',name:'Tofu (100g)',calories:76,protein:8,carbs:2,fats:4.5},
  {id:'df6b',name:'Rajma (1 cup)',calories:225,protein:15,carbs:40,fats:1},
  {id:'df8',name:'Oats (50g)',calories:188,protein:6.5,carbs:32,fats:3.5},
  {id:'df9',name:'Banana',calories:89,protein:1.1,carbs:23,fats:0.3},
  {id:'df10',name:'Eggs (2)',calories:148,protein:12,carbs:1,fats:10},
  {id:'df11',name:'Dahi (100g)',calories:61,protein:3.5,carbs:4.7,fats:3.3},
  {id:'df12',name:'Mixed Veg Curry',calories:130,protein:4,carbs:18,fats:5},
  {id:'df13',name:'Idli (2 pcs)',calories:130,protein:4,carbs:26,fats:0.5},
  {id:'df14',name:'Sambar (1 cup)',calories:100,protein:4,carbs:16,fats:2},
  {id:'df15',name:'Curd Rice',calories:200,protein:5,carbs:38,fats:3},
];

const MEALS = ['Breakfast','Lunch','Dinner','Snacks'];

function load(k, fb) {
  try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch { return fb; }
}
function save(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
}
function persist() {
  save('ft_entries', S.entries);
  save('ft_saved', S.saved);
  save('ft_goals', S.goals);
  save('ft_streak', S.streak);
  save('ft_lastDate', S.lastDate);
}
function genId() { return Math.random().toString(36).slice(2,9); }
function today() { return new Date().toISOString().split('T')[0]; }
function clamp(v,a,b) { return Math.min(Math.max(v,a),b); }
function todayEntries() { return S.entries.filter(e => new Date(e.timestamp).toISOString().split('T')[0] === today()); }
function totals(entries) {
  return entries.reduce((a,e) => ({calories:a.calories+e.calories,protein:a.protein+e.protein,carbs:a.carbs+e.carbs,fats:a.fats+e.fats}),{calories:0,protein:0,carbs:0,fats:0});
}

// ── STREAK ──
function updateStreak() {
  const t = today();
  const te = todayEntries();
  if (te.length > 0 && S.lastDate !== t) {
    const yd = new Date(); yd.setDate(yd.getDate()-1);
    const yds = yd.toISOString().split('T')[0];
    S.streak = S.lastDate === yds ? S.streak + 1 : 1;
    S.lastDate = t;
    persist();
  }
}

// ── HEADER ──
function initHeader() {
  document.getElementById('headerDate').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  updateStreakUI();
}
function updateStreakUI() {
  const b = document.getElementById('streakBadge');
  const n = document.getElementById('streakNum');
  if (S.streak > 0) { b.style.display='flex'; n.textContent = S.streak; }
  else { b.style.display='none'; }
}

// ── TABS ──
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  S.currentTab = name;
  render();
}

function render() {
  const c = document.getElementById('mainContent');
  if (S.currentTab === 'dashboard') c.innerHTML = renderDashboard();
  else if (S.currentTab === 'log') c.innerHTML = renderLog();
  else if (S.currentTab === 'saved') c.innerHTML = renderSaved();
  else if (S.currentTab === 'calc') c.innerHTML = renderCalc();
  else if (S.currentTab === 'analytics') c.innerHTML = renderAnalytics();
  else if (S.currentTab === 'goals') c.innerHTML = renderGoals();
}

// ── PROGRESS BAR HTML ──
function progressBarHTML(value, max, color, height=8) {
  const pct = max > 0 ? clamp((value/max)*100, 0, 110) : 0;
  const over = pct > 100;
  const bg = over ? 'linear-gradient(90deg,#ef4444,#f97316)' : `linear-gradient(90deg,${color}cc,${color})`;
  return `<div class="progress-wrap" style="height:${height}px"><div class="progress-bar" style="width:${Math.min(pct,100)}%;background:${bg};box-shadow:0 0 10px ${color}55;height:100%"></div></div>`;
}

function macroPillHTML(label, value, color, unit='g') {
  return `<div class="macro-pill" style="background:${color}18;border:1px solid ${color}40"><span class="macro-val" style="color:${color}">${Math.round(value)}${unit}</span><span class="macro-label">${label}</span></div>`;
}

function foodItemHTML(e) {
  return `<div class="food-item">
    <div style="flex:1">
      <div class="food-name">${e.name}</div>
      <div class="food-macros">
        <span class="food-kcal">${e.calories} kcal</span>
        <span class="food-macro">P:${e.protein}g · C:${e.carbs}g · F:${e.fats}g</span>
      </div>
    </div>
    <div class="food-actions">
      <button class="btn btn-sm btn-ghost" data-id="${e.id}" onclick="editEntry(this.dataset.id)">✏️</button>
      <button class="btn btn-sm btn-danger" data-id="${e.id}" onclick="deleteEntry(this.dataset.id)">✕</button>
    </div>
  </div>`;
}

// ── DASHBOARD ──
function renderDashboard() {
  const te = todayEntries();
  const t = totals(te);
  const goalCal = S.goals.calories || 2000;
  const goalProt = S.goals.protein || 150;
  const remaining = goalCal - t.calories;

  let html = '';

  // Streak
  if (S.streak > 0) html += `<div class="streak-banner"><span style="font-size:22px">🔥</span><div><div style="color:#f97316;font-weight:700;font-size:14px">${S.streak} Day Streak!</div><div style="color:#64748b;font-size:12px">Keep logging daily</div></div></div>`;

  // Calorie card
  html += `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div>
        <div style="color:#64748b;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em">Today's Calories</div>
        <div style="display:flex;align-items:baseline;gap:6px;margin-top:4px">
          <span style="color:#f97316;font-size:38px;font-weight:800;line-height:1">${Math.round(t.calories)}</span>
          <span style="color:#475569;font-size:15px">/ ${goalCal} kcal</span>
        </div>
      </div>
      <div class="${remaining>0?'deficit-card':'deficit-card over'}">
        <div style="color:${remaining>0?'#22d3ee':'#f87171'};font-size:20px;font-weight:800">${Math.abs(Math.round(remaining))}</div>
        <div style="color:#475569;font-size:11px;font-weight:600">${remaining>0?'remaining':'over'}</div>
      </div>
    </div>
    ${progressBarHTML(t.calories, goalCal, '#f97316', 10)}
    <div class="macro-pills">
      ${macroPillHTML('Protein',t.protein,'#22d3ee')}
      ${macroPillHTML('Carbs',t.carbs,'#a78bfa')}
      ${macroPillHTML('Fats',t.fats,'#fb7185')}
    </div>
  </div>`;

  // Protein bar
  html += `<div class="card" style="padding:14px 18px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="color:#f1f5f9;font-weight:600;font-size:14px">Protein Goal</span>
      <span style="color:#22d3ee;font-size:13px;font-weight:700">${Math.round(t.protein)}g / ${goalProt}g</span>
    </div>
    ${progressBarHTML(t.protein, goalProt, '#22d3ee', 8)}
  </div>`;

  // Insights
  if (t.protein < goalProt*0.5 && te.length > 0) html += insightHTML('⚠️','Protein intake is low today','#fbbf24');
  if (t.calories > goalCal*1.1) html += insightHTML('🔥','You exceeded your calorie goal','#f87171');
  if (remaining > 0 && t.calories > goalCal*0.8) html += insightHTML('✅','Almost at your calorie goal!','#34d399');
  if (te.length === 0) html += insightHTML('📝','Start logging your meals today','#a78bfa');

  // Add button
  html += `<button class="btn btn-primary btn-block" onclick="openAddModal()" style="margin-bottom:12px">＋ Add Food</button>`;

  // Meals
  MEALS.forEach(meal => {
    const items = te.filter(e => e.meal === meal);
    const mc = items.reduce((s,e)=>s+e.calories,0);
    html += `<div class="card">
      <div class="meal-header">
        <div>
          <div class="meal-name">${meal}</div>
          <div class="meal-meta">${items.length} items${mc>0?' · '+Math.round(mc)+' kcal':''}</div>
        </div>
        <button class="btn btn-sm btn-ghost" onclick="openAddModal('${meal}')">+ Add</button>
      </div>
      ${items.map(e=>foodItemHTML(e)).join('')}
    </div>`;
  });

  return html;
}

function insightHTML(icon, msg, color) {
  return `<div class="insight" style="background:${color}10;border:1px solid ${color}25"><span class="insight-icon">${icon}</span><span class="insight-text" style="color:${color}">${msg}</span></div>`;
}

// ── LOG TAB ──
function renderLog() {
  const grouped = {};
  S.entries.forEach(e => {
    const d = new Date(e.timestamp).toISOString().split('T')[0];
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(e);
  });
  const dates = Object.keys(grouped).sort((a,b)=>b.localeCompare(a));

  let html = `<button class="btn btn-primary btn-block" onclick="openAddModal()" style="margin-bottom:12px">＋ Log Food</button>`;

  if (dates.length === 0) {
    html += `<div class="card" style="text-align:center;padding:40px 20px"><div style="font-size:44px">🍽️</div><div style="color:#475569;margin-top:12px;font-size:15px">No entries yet. Start logging!</div></div>`;
    return html;
  }

  dates.forEach(date => {
    const dayE = grouped[date];
    const dTotal = dayE.reduce((s,e)=>s+e.calories,0);
    const isToday = date === today();
    const label = isToday ? 'Today' : new Date(date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
    html += `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="color:#f1f5f9;font-weight:700">${label}</div>
        <span style="color:#f97316;font-weight:700">${Math.round(dTotal)} kcal</span>
      </div>
      ${dayE.map(e=>foodItemHTML(e)).join('')}
    </div>`;
  });

  return html;
}

// ── SAVED TAB ──

  const allFoods = [...DEFAULT_FOODS, ...S.saved];
  let html = `
  <div style="display:flex;gap:10px;margin-bottom:12px">
    <div style="flex:1"><input class="search-input" id="savedSearch" oninput="filterSaved()" placeholder="Search foods..."/></div>
    <button class="btn btn-primary" onclick="toggleSaveForm()">＋ Save</button>

  <div id="saveForm" style="display:none" class="card">
    <div class="card-title">Save New Food</div>
    <div class="field"><label>Food Name</label><div class="field-wrap"><input id="sf_name" type="text" placeholder="e.g. Protein Bar"/></div></div>
    <div class="grid2">
      <div class="field"><label>Calories</label><div class="field-wrap"><input id="sf_cal" type="number" placeholder="0"/><span class="unit">kcal</span></div></div>

      <div class="field"><label>Carbs</label><div class="field-wrap"><input id="sf_carbs" type="number" placeholder="0"/><span class="unit">g</span></div></div>
      <div class="field"><label>Fats</label><div class="field-wrap"><input id="sf_fats" type="number" placeholder="0"/><span class="unit">g</span></div></div>

function savedFoodHTML(food) {
  const isDefault = DEFAULT_FOODS.find(d=>d.id===food.id);
  return `<div class="saved-item">
    <div style="flex:1">
      <div style="color:#f1f5f9;font-weight:600;font-size:14px">${food.name}</div>
      <div class="food-macros" style="margin-top:4px">
        <span class="food-kcal">${food.calories} kcal</span>
        <span class="food-macro">P:${food.protein}g C:${food.carbs}g F:${food.fats}g</span>
      </div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn btn-sm btn-primary" onclick="quickAddFood('${food.id}')">Add</button>
      ${!isDefault?`<button class="btn btn-sm btn-danger" onclick="deleteSaved('${food.id}')">✕</button>`:''}
    </div>
  </div>`;
}

function filterSaved() {
  const q = document.getElementById('savedSearch').value.toLowerCase();
  const all = [...DEFAULT_FOODS, ...S.saved];
  const filtered = all.filter(f=>f.name.toLowerCase().includes(q));
  document.getElementById('savedList').innerHTML = filtered.map(f=>savedFoodHTML(f)).join('');
}

function toggleSaveForm() {
  const f = document.getElementById('saveForm');
  if(f) f.style.display = f.style.display==='none' ? 'block' : 'none';
}

function saveNewFood() {
  const name = document.getElementById('sf_name').value;
  const cal = document.getElementById('sf_cal').value;
  if(!name||!cal) return;
  const food = {id:genId(),name,calories:parseFloat(cal)||0,protein:parseFloat(document.getElementById('sf_prot').value)||0,carbs:parseFloat(document.getElementById('sf_carbs').value)||0,fats:parseFloat(document.getElementById('sf_fats').value)||0};
  S.saved.push(food);
  persist();
  render();
}

function quickAddFood(id) {
  const all = [...DEFAULT_FOODS, ...S.saved];
  const food = all.find(f=>f.id===id);
  if(!food) return;
  S.entries.push({...food, id:genId(), meal:'Snacks', timestamp:Date.now()});
  persist();
  updateStreak();
  switchTab('dashboard', document.getElementById('tab-dashboard'));
}

function deleteSaved(id) {
  S.saved = S.saved.filter(f=>f.id!==id);
  persist();
  render();
}

// ── CALC TAB ──

  const g = S.goals;
  return `<div class="card">
    <div class="card-title">🔢 TDEE Calculator</div>
    <div class="grid2">
      <div class="field"><label>Weight</label><div class="field-wrap"><input id="c_weight" type="number" value="${g.weight||''}" placeholder="70"/><span class="unit">kg</span></div></div>

    </div>
    <div class="field"><label>Activity Level</label><div class="field-wrap"><select id="c_activity">

      <option value="1.375" ${g.activity==1.375?'selected':''}>Light — 1–3 days/week</option>
      <option value="1.55" ${!g.activity||g.activity==1.55?'selected':''}>Moderate — 3–5 days/week</option>
      <option value="1.725" ${g.activity==1.725?'selected':''}>Active — 6–7 days/week</option>
      <option value="1.9" ${g.activity==1.9?'selected':''}>Very Active — Hard daily exercise</option>
    </select></div></div>
    <div class="field"><label>Goal</label><div class="field-wrap"><select id="c_goal" onchange="toggleCustomDeficit()">
      <option value="loss" ${g.goal==='loss'||!g.goal?'selected':''}>🔥 Fat Loss (−500 kcal)</option>
      <option value="maintenance" ${g.goal==='maintenance'?'selected':''}>⚖️ Maintenance</option>
      <option value="gain" ${g.goal==='gain'?'selected':''}>💪 Muscle Gain (+300 kcal)</option>
      <option value="custom" ${g.goal==='custom'?'selected':''}>✏️ Custom Deficit/Surplus</option>
    </select></div></div>
    <div id="custom_deficit_wrap" style="display:${g.goal==='custom'?'block':'none'}">
      <div class="field"><label>Custom Adjustment (negative = deficit)</label><div class="field-wrap"><input id="c_custom" type="number" value="${g.customAdj||'-750'}" placeholder="-750"/><span class="unit">kcal</span></div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
        ${[-250,-500,-750,-1000,250,500].map(v=>`<button onclick="setCustomAdj(${v})" style="padding:5px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(30,41,59,0.6);color:${v<0?'#22d3ee':'#34d399'};font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">${v>0?'+':''}${v}</button>`).join('')}
      </div>
    </div>
    <button class="btn btn-orange btn-block" onclick="runCalc()">Calculate My Goals</button>
    <div style="margin-top:12px;background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.2);border-radius:12px;padding:12px 14px">
      <div style="color:#94a3b8;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px">Custom Protein Goal (optional)</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div style="flex:1;position:relative">
          <input id="c_protein_custom" type="number" placeholder="Leave blank = auto (2g/kg)" value="${g.customProtein||''}" style="width:100%;background:rgba(30,41,59,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px 40px 10px 14px;color:#f1f5f9;font-size:15px;outline:none;font-family:inherit"/>

function toggleCustomDeficit() {
  const v = document.getElementById('c_goal').value;
  const wrap = document.getElementById('custom_deficit_wrap');
  if(wrap) wrap.style.display = v==='custom' ? 'block' : 'none';
}
function setCustomAdj(val) {
  const el = document.getElementById('c_custom');
  if(el) el.value = val;
}

function runCalc() {
  const w=parseFloat(document.getElementById('c_weight').value);
  const h=parseFloat(document.getElementById('c_height').value);
  const a=parseFloat(document.getElementById('c_age').value);
  const gender=document.getElementById('c_gender').value;
  const activity=parseFloat(document.getElementById('c_activity').value);
  const goal=document.getElementById('c_goal').value;
  if(!w||!h||!a) return;
  const bmr = gender==='male' ? 10*w+6.25*h-5*a+5 : 10*w+6.25*h-5*a-161;
  const tdee = Math.round(bmr*activity);

  let adj = 0;
  let customAdj = 0;
  if(goal==='loss') adj = -500;
  else if(goal==='maintenance') adj = 0;
  else if(goal==='gain') adj = 300;
  else if(goal==='custom') {
    customAdj = parseInt(document.getElementById('c_custom').value) || -750;
    adj = customAdj;
  }

  const target = tdee + adj;
  const customProteinInput = parseInt(document.getElementById('c_protein_custom')?.value);
  const protein = customProteinInput > 0 ? customProteinInput : Math.round(w*2);
  const weeklyChange = (Math.abs(adj)*7/7700).toFixed(2);
  const isDeficit = adj < 0;

  S.goals = {...S.goals, calories:target, protein, weight:w, height:h, age:a, gender, activity, goal, customAdj, customProtein: customProteinInput||null};
  persist();
  updateStreakUI();

  const results = [
    {icon:'⚡',label:'TDEE (Maintenance)',value:`${tdee} kcal/day`,color:'#a78bfa'},
    {icon:'🎯',label:'Daily Calorie Goal',value:`${target} kcal/day`,color:'#f97316'},
    {icon:'💪',label:'Protein Goal',value:`${protein}g/day`,color:'#22d3ee'},
    {icon:isDeficit?'📉':'📈',label:isDeficit?'Est. Weekly Fat Loss':'Est. Weekly Gain',value:adj===0?'0 kg':`~${weeklyChange} kg/week`,color:isDeficit?'#34d399':'#fb7185'},
  ];

  let html = results.map(r=>`<div class="card" style="padding:14px 18px;margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:20px">${r.icon}</span>
        <span style="color:#94a3b8;font-size:14px">${r.label}</span>
      </div>
      <span style="color:${r.color};font-weight:800;font-size:16px">${r.value}</span>
    </div>
  </div>`).join('');
  html += `<div style="background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.3);border-radius:14px;padding:12px 16px;margin-bottom:12px"><span style="color:#a5b4fc;font-size:13px;font-weight:600">✅ Goals saved to your dashboard!</span></div>`;
  document.getElementById('calcResults').innerHTML = html;
}

// ── ANALYTICS TAB ──
let analyticsWeekOffset = 0; // 0 = this week, -1 = last week etc

function renderAnalytics() {
  const goalCal = S.goals.calories || 2000;

  // Build days for selected week
  const days = Array.from({length:7},(_,i)=>{
    const d = new Date();
    d.setDate(d.getDate() - (6-i) + (analyticsWeekOffset * 7));
    const ds = d.toISOString().split('T')[0];
    const de = S.entries.filter(e=>new Date(e.timestamp).toISOString().split('T')[0]===ds);
    return {date:ds,label:d.toLocaleDateString('en-US',{weekday:'short'}),calories:Math.round(de.reduce((s,e)=>s+e.calories,0)),protein:Math.round(de.reduce((s,e)=>s+e.protein,0)),hasData:de.length>0};
  });

  const weekStart = days[0].date;
  const weekEnd = days[6].date;
  const weekLabel = analyticsWeekOffset===0 ? 'This Week' : analyticsWeekOffset===-1 ? 'Last Week' : `${weekStart} → ${weekEnd}`;

  const withData = days.filter(d=>d.hasData);
  const avg = Math.round(withData.reduce((s,d)=>s+d.calories,0)/(withData.length||1));
  const avgProt = Math.round(withData.reduce((s,d)=>s+d.protein,0)/(withData.length||1));
  const defDays = days.filter(d=>d.hasData&&d.calories<goalCal).length;
  const maxCal = Math.max(...days.map(d=>d.calories), goalCal, 1);

  let html = `
  <!-- Week Navigator -->
  <div class="card" style="padding:12px 16px;margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <button onclick="changeWeek(-1)" style="background:rgba(99,102,241,0.2);border:1px solid rgba(99,102,241,0.3);border-radius:10px;padding:6px 14px;color:#a5b4fc;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">← Prev</button>
      <div style="text-align:center">
        <div style="color:#f1f5f9;font-weight:700;font-size:14px">${weekLabel}</div>
        <div style="color:#475569;font-size:11px;margin-top:2px">${weekStart} → ${weekEnd}</div>
      </div>
      <button onclick="changeWeek(1)" ${analyticsWeekOffset>=0?'disabled style="opacity:0.3;cursor:not-allowed;':'style="'}background:rgba(99,102,241,0.2);border:1px solid rgba(99,102,241,0.3);border-radius:10px;padding:6px 14px;color:#a5b4fc;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">Next →</button>
    </div>
  </div>`;

  html += `<div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Avg Calories</div><div class="stat-value" style="color:#f97316">${avg}<span class="stat-unit"> kcal</span></div></div>
    <div class="stat-card"><div class="stat-label">Avg Protein</div><div class="stat-value" style="color:#22d3ee">${avgProt}<span class="stat-unit"> g</span></div></div>
    <div class="stat-card"><div class="stat-label">Deficit Days</div><div class="stat-value" style="color:#34d399">${defDays}<span class="stat-unit">/7</span></div></div>
    <div class="stat-card"><div class="stat-label">Calorie Goal</div><div class="stat-value" style="color:#a78bfa">${goalCal}<span class="stat-unit"> kcal</span></div></div>
  </div>`;

  // Bar chart
  html += `<div class="card"><div class="card-title">7-Day Calories</div><div class="bar-chart">`;
  days.forEach(day => {
    const h = day.calories > 0 ? (day.calories/maxCal)*110 : 4;
    const isT = day.date === today();
    const over = day.calories > goalCal;
    const bg = day.calories===0?'rgba(30,41,59,0.4)':over?'linear-gradient(to top,#ef4444,#f97316)':isT?'linear-gradient(to top,#6366f1cc,#a78bfa)':'linear-gradient(to top,#f97316cc,#f97316)';
    html += `<div class="bar-col">
      <div class="bar-val">${day.calories>0?day.calories:''}</div>
      <div class="bar" style="height:${h}px;background:${bg};box-shadow:${day.calories>0?`0 0 10px ${over?'#ef4444':'#f97316'}44`:'none'}"></div>
      <div class="bar-day ${isT?'today':''}">${day.label}</div>
    </div>`;
  });
  html += `</div>
    <div style="margin-top:12px;display:flex;align-items:center;gap:8px">
      <div style="width:16px;height:2px;background:#a78bfa;border-radius:99px"></div>
      <span style="color:#64748b;font-size:11px">Goal: ${goalCal} kcal</span>
    </div>
  </div>`;

  // Insights
  let insights = '';
  if(defDays>=5) insights += insightHTML('🔥',"You're in a consistent calorie deficit!",'#34d399');
  if(avgProt<(S.goals.protein||150)*0.7&&withData.length>0) insights += insightHTML('⚠️','Average protein is low this week','#fbbf24');
  if(avg<goalCal*0.8&&avg>0) insights += insightHTML('💪','Great calorie control this week!','#22d3ee');
  if(avg>goalCal*1.05&&withData.length>3) insights += insightHTML('⚠️','Calories above goal most days','#f87171');
  if(insights) html += `<div class="card"><div class="card-title">Weekly Insights</div>${insights}</div>`;
  if(!withData.length) html += `<div class="card" style="text-align:center;padding:30px 20px"><div style="font-size:36px">📊</div><div style="color:#475569;margin-top:10px;font-size:14px">No data logged this week</div></div>`;

  return html;
}

function changeWeek(dir) {
  analyticsWeekOffset = Math.min(0, analyticsWeekOffset + dir);
  render();
}

// ── GOALS TAB ──
let goalsWeekOffset = 0;

function renderGoals() {
  const wLog = S.goals.weightLog || [];
  const latestW = wLog.length>0?wLog[wLog.length-1].weight:null;
  const firstW = wLog.length>1?wLog[0].weight:null;
  const wChange = latestW&&firstW?(latestW-firstW).toFixed(1):null;

  // Build selected week's days
  const goalCal = S.goals.calories || 2000;
  let totalDef = 0;
  let daysLogged = 0;
  let weekDates = [];
  for(let i=6;i>=0;i--){
    const d = new Date();
    d.setDate(d.getDate() - i + (goalsWeekOffset * 7));
    const ds = d.toISOString().split('T')[0];
    weekDates.push(ds);
    const dayEntries = S.entries.filter(e=>new Date(e.timestamp).toISOString().split('T')[0]===ds);
    if(dayEntries.length>0){
      const dayCals = dayEntries.reduce((s,e)=>s+e.calories,0);
      totalDef += Math.max(0, goalCal - dayCals);
      daysLogged++;
    }
  }
  const estFat = (totalDef/7700).toFixed(2);
  const weekLabel = goalsWeekOffset===0?'This Week':goalsWeekOffset===-1?'Last Week':`${weekDates[0]} → ${weekDates[6]}`;

  let html = `<div class="card">
    <div class="card-title">⚖️ Weight Tracker</div>
    ${latestW?`<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:16px">
      <span style="color:#22d3ee;font-size:36px;font-weight:800">${latestW}</span>
      <span style="color:#475569;font-size:16px">kg</span>
      ${wChange!==null?`<span style="font-size:14px;font-weight:700;color:${parseFloat(wChange)<0?'#34d399':parseFloat(wChange)>0?'#f87171':'#64748b'}">${parseFloat(wChange)>0?'+':''}${wChange} kg</span>`:''}
    </div>`:''}
    <div style="display:flex;gap:10px;margin-bottom:${wLog.length>0?16:0}px">
      <div style="flex:1"><div class="field"><div class="field-wrap"><input id="w_input" type="number" placeholder="Today's weight" style="background:rgba(30,41,59,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px 40px 10px 14px;color:#f1f5f9;font-size:15px;outline:none;width:100%;font-family:inherit"/><span class="unit">kg</span></div></div></div>
      <button class="btn btn-primary" onclick="logWeight()">Log</button>
    </div>
    ${wLog.length>0?[...wLog].reverse().slice(0,7).map(e=>`<div class="weight-row"><span style="color:#64748b;font-size:13px">${e.date===today()?'Today':e.date}</span><span style="color:#22d3ee;font-weight:700;font-size:13px">${e.weight} kg</span></div>`).join(''):''}
  </div>

  <div class="card" style="padding:16px 20px">
    <div class="card-title">📉 Weekly Deficit Estimate</div>
    <!-- Week Navigator -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <button onclick="changeGoalsWeek(-1)" style="background:rgba(99,102,241,0.2);border:1px solid rgba(99,102,241,0.3);border-radius:10px;padding:6px 14px;color:#a5b4fc;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">← Prev</button>
      <div style="text-align:center">
        <div style="color:#f1f5f9;font-weight:700;font-size:13px">${weekLabel}</div>
        <div style="color:#475569;font-size:11px;margin-top:1px">${weekDates[0]} → ${weekDates[6]}</div>
      </div>
      <button onclick="changeGoalsWeek(1)" ${goalsWeekOffset>=0?'disabled style="opacity:0.3;cursor:not-allowed;"':'style="cursor:pointer;"'} style="background:rgba(99,102,241,0.2);border:1px solid rgba(99,102,241,0.3);border-radius:10px;padding:6px 14px;color:#a5b4fc;font-size:14px;font-weight:700;font-family:inherit">Next →</button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div><div style="color:#64748b;font-size:12px">Total deficit (${daysLogged} days logged)</div><div style="color:#34d399;font-size:26px;font-weight:800;margin-top:4px">${Math.round(totalDef)} kcal</div></div>
      <div style="text-align:right"><div style="color:#64748b;font-size:12px">Est. fat loss</div><div style="color:#f97316;font-size:26px;font-weight:800;margin-top:4px">${estFat} kg</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🎯 Daily Goals</div>
    <div class="field"><label>Daily Calorie Goal</label><div class="field-wrap"><input id="g_cal" type="number" value="${S.goals.calories||2000}"/><span class="unit">kcal</span></div></div>
    <div class="field"><label>Daily Protein Goal</label><div class="field-wrap"><input id="g_prot" type="number" value="${S.goals.protein||150}"/><span class="unit">g</span></div></div>
    <button class="btn btn-success btn-block" onclick="saveGoals()">Save Goals</button>
  </div>`;

  return html;
}

function changeGoalsWeek(dir) {
  goalsWeekOffset = Math.min(0, goalsWeekOffset + dir);
  render();
}

function logWeight() {
  const v = parseFloat(document.getElementById('w_input').value);
  if(!v) return;
  if(!S.goals.weightLog) S.goals.weightLog = [];
  S.goals.weightLog.push({date:today(), weight:v});
  S.goals.weight = v;
  persist();
  render();
}

function saveGoals() {
  S.goals.calories = parseInt(document.getElementById('g_cal').value)||2000;
  S.goals.protein = parseInt(document.getElementById('g_prot').value)||150;
  persist();
  const btn = event.target;
  btn.textContent = '✅ Saved!';
  setTimeout(()=>btn.textContent='Save Goals', 1500);
}

// ── ADD MODAL ──
let modalMode = 'manual';
let modalMeal = 'Breakfast';
let modalDate = null; // null = always use today() fresh

function openAddModal(meal, date) {
  modalMeal = meal || 'Breakfast';
  modalMode = 'manual';
  modalDate = date || today(); // always get fresh today
  renderModal();
}

let modalQty = 1;

function renderModal() {
  const allFoods = [...DEFAULT_FOODS, ...S.saved];
  const search = document.getElementById('modal_search') ? document.getElementById('modal_search').value : '';
  const filtered = search ? allFoods.filter(f=>f.name.toLowerCase().includes(search.toLowerCase())) : allFoods;

  const mealPills = MEALS.map(m=>`<button class="meal-pill ${modalMeal===m?'active':''}" onclick="setModalMeal('${m}')">${m}</button>`).join('');

  let body = '';
  if(modalMode==='manual') {
    body = `
    <div class="field"><label>Food Name</label><div class="field-wrap"><input id="m_name" type="text" placeholder="e.g. Chicken Breast" autofocus/></div></div>
    <div class="grid2">
      <div class="field"><label>Calories</label><div class="field-wrap"><input id="m_cal" type="number" placeholder="0" oninput="changeManualQty(0)"/><span class="unit">kcal</span></div></div>
      <div class="field"><label>Protein</label><div class="field-wrap"><input id="m_prot" type="number" placeholder="0"/><span class="unit">g</span></div></div>
      <div class="field"><label>Carbs</label><div class="field-wrap"><input id="m_carbs" type="number" placeholder="0"/><span class="unit">g</span></div></div>
      <div class="field"><label>Fats</label><div class="field-wrap"><input id="m_fats" type="number" placeholder="0"/><span class="unit">g</span></div></div>
    </div>
    <div style="margin-bottom:12px">
      <label style="color:#94a3b8;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;display:block;margin-bottom:6px">Quantity</label>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="qty-stepper" style="flex:1;justify-content:space-between">
          <button class="qty-btn" style="flex:1" onclick="changeManualQty(-1)">−</button>
          <span class="qty-val" id="manual_qty" style="flex:1;text-align:center;font-size:18px">1</span>
          <button class="qty-btn" style="flex:1" onclick="changeManualQty(1)">+</button>
        </div>
        <div style="color:#475569;font-size:12px;font-weight:600;min-width:80px" id="manual_preview"></div>
      </div>
    </div>
    <button class="btn btn-primary btn-block" onclick="submitAdd()">Add to ${modalMeal}</button>`;
  } else {
    const items = filtered.map(food=>{
      const isDefault = DEFAULT_FOODS.find(d=>d.id===food.id);
      return `<div class="saved-item">
        <div style="flex:1">
          <div style="color:#f1f5f9;font-weight:600;font-size:14px">${food.name}</div>
          <div class="food-macros" style="margin-top:4px">
            <span class="food-kcal">${food.calories} kcal</span>
            <span class="food-macro">P:${food.protein}g C:${food.carbs}g F:${food.fats}g</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="qty-stepper">
            <button class="qty-btn" data-id="qty_${food.id}" onclick="changeQty('qty_${food.id}',-1)">−</button>
            <span class="qty-val" id="qty_${food.id}">1</span>
            <button class="qty-btn" data-id="qty_${food.id}" onclick="changeQty('qty_${food.id}',1)">+</button>
          </div>
          <button class="btn btn-sm btn-primary" data-id="${food.id}" onclick="quickAddModal(this.dataset.id)">Add</button>
          ${!isDefault?`<button class="btn btn-sm btn-danger" data-id="${food.id}" onclick="deleteSavedModal(this.dataset.id)">✕</button>`:''}
        </div>
      </div>`;
    }).join('');
    body = `<input class="search-input" id="modal_search" placeholder="Search foods..." oninput="renderModal()" style="margin-bottom:10px"/>
    <div style="max-height:320px;overflow-y:auto">${items || '<div style="text-align:center;color:#475569;padding:20px">No foods found</div>'}</div>`;
  }

  document.getElementById('modalContainer').innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-handle"><div class="modal-handle-bar"></div></div>
      <div class="modal-header">
        <span class="modal-title">Add Food</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="mode-toggle">
          <button class="mode-btn ${modalMode==='manual'?'active':''}" onclick="setModalMode('manual')">✏️ Manual Entry</button>
          <button class="mode-btn ${modalMode==='saved'?'active':''}" onclick="setModalMode('saved')">⚡ Quick Add</button>
        </div>
        <!-- Date picker -->
        <div class="field" style="margin-bottom:12px">
          <label>Log Date</label>
          <div class="field-wrap">
            <input type="date" id="modal_date" value="${modalDate}" max="${today()}" onchange="modalDate=this.value" style="background:rgba(30,41,59,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px 14px;color:#f1f5f9;font-size:15px;outline:none;width:100%;font-family:inherit;-webkit-appearance:none;color-scheme:dark"/>
          </div>
        </div>
        <div class="meal-pills">${mealPills}</div>
        ${body}
      </div>
    </div>
  </div>`;

  if(modalMode==='manual') {
    setTimeout(()=>{ const n=document.getElementById('m_name'); if(n) n.focus(); },100);
  }
}

function setModalMode(mode) { modalMode = mode; renderModal(); }
function setModalMeal(meal) { modalMeal = meal; renderModal(); }
function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }

function changeManualQty(delta) {
  const el = document.getElementById('manual_qty');
  if(!el) return;
  let v = parseInt(el.textContent) + delta;
  if(v < 1) v = 1;
  if(v > 20) v = 20;
  el.textContent = v;
  // Update live preview
  const cal = parseFloat(document.getElementById('m_cal').value) || 0;
  const prev = document.getElementById('manual_preview');
  if(prev && cal > 0) prev.textContent = `= ${Math.round(cal * v)} kcal`;
  else if(prev) prev.textContent = '';
}

function submitAdd() {
  const name = document.getElementById('m_name').value;
  const cal = parseFloat(document.getElementById('m_cal').value);
  if(!name || !cal) return;
  const qty = parseInt(document.getElementById('manual_qty')?.textContent) || 1;
  // Use selected date at noon to avoid timezone issues
  const logDate = document.getElementById('modal_date')?.value || today();
  const timestamp = new Date(logDate + 'T12:00:00').getTime();
  S.entries.push({
    id: genId(),
    name: qty > 1 ? `${name} ×${qty}` : name,
    calories: Math.round(cal * qty),
    protein: Math.round((parseFloat(document.getElementById('m_prot').value)||0) * qty * 10) / 10,
    carbs: Math.round((parseFloat(document.getElementById('m_carbs').value)||0) * qty * 10) / 10,
    fats: Math.round((parseFloat(document.getElementById('m_fats').value)||0) * qty * 10) / 10,
    meal: modalMeal,
    timestamp
  });
  persist();
  updateStreak();
  updateStreakUI();
  closeModal();
  render();
}

function fillForm(id) {
  const all = [...DEFAULT_FOODS,...S.saved];
  const food = all.find(f=>f.id===id);
  if(!food) return;
  modalMode = 'manual';
  renderModal();
  setTimeout(()=>{
    document.getElementById('m_name').value = food.name;
    document.getElementById('m_cal').value = food.calories;
    document.getElementById('m_prot').value = food.protein;
    document.getElementById('m_carbs').value = food.carbs;
    document.getElementById('m_fats').value = food.fats;
  },50);
}

function changeQty(elId, delta) {
  const el = document.getElementById(elId);
  if(!el) return;
  let v = parseInt(el.textContent) + delta;
  if(v < 1) v = 1;
  if(v > 20) v = 20;
  el.textContent = v;
}

function deleteSavedModal(id) {
  S.saved = S.saved.filter(f=>f.id!==id);
  persist();
  renderModal();
}

function quickAddModal(id) {
  const all = [...DEFAULT_FOODS,...S.saved];
  const food = all.find(f=>f.id===id);
  if(!food) return;
  const qtyEl = document.getElementById('qty_'+id);
  const qty = qtyEl ? parseInt(qtyEl.textContent) || 1 : 1;
  const logDate = document.getElementById('modal_date')?.value || today();
  const timestamp = new Date(logDate + 'T12:00:00').getTime();
  S.entries.push({
    id: genId(),
    name: qty > 1 ? `${food.name} ×${qty}` : food.name,
    calories: Math.round(food.calories * qty),
    protein: Math.round(food.protein * qty * 10) / 10,
    carbs: Math.round(food.carbs * qty * 10) / 10,
    fats: Math.round(food.fats * qty * 10) / 10,
    meal: modalMeal,
    timestamp
  });
  persist();
  updateStreak();
  updateStreakUI();
  closeModal();
  render();
}

// ── EDIT ENTRY ──
function editEntry(id) {
  const e = S.entries.find(x=>x.id===id);
  if(!e) return;
  const mealPills = MEALS.map(m=>`<button class="meal-pill ${e.meal===m?'active':''}" onclick="setEditMeal(this,'${m}')">${m}</button>`).join('');
  document.getElementById('modalContainer').innerHTML = `
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-handle"><div class="modal-handle-bar"></div></div>
      <div class="modal-header">
        <span class="modal-title">Edit Entry</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="field"><label>Food Name</label><div class="field-wrap"><input id="e_name" type="text" value="${e.name}"/></div></div>
        <div class="grid2">
          <div class="field"><label>Calories</label><div class="field-wrap"><input id="e_cal" type="number" value="${e.calories}"/><span class="unit">kcal</span></div></div>
          <div class="field"><label>Protein</label><div class="field-wrap"><input id="e_prot" type="number" value="${e.protein}"/><span class="unit">g</span></div></div>
          <div class="field"><label>Carbs</label><div class="field-wrap"><input id="e_carbs" type="number" value="${e.carbs}"/><span class="unit">g</span></div></div>
          <div class="field"><label>Fats</label><div class="field-wrap"><input id="e_fats" type="number" value="${e.fats}"/><span class="unit">g</span></div></div>
        </div>
        <div class="meal-pills" id="editMealPills">${mealPills}</div>
        <button class="btn btn-primary btn-block" data-id="${e.id}" onclick="saveEdit(this.dataset.id)">Save Changes</button>
      </div>
    </div>
  </div>`;
}

function setEditMeal(btn, meal) {
  document.querySelectorAll('#editMealPills .meal-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  btn.dataset.meal = meal;
}

function saveEdit(id) {
  const activeMeal = document.querySelector('#editMealPills .meal-pill.active');
  const meal = activeMeal ? activeMeal.textContent.trim() : 'Snacks';
  const idx = S.entries.findIndex(x => x.id === id);
  if(idx < 0) return;
  S.entries[idx] = {
    ...S.entries[idx],
    name: document.getElementById('e_name').value,
    calories: parseFloat(document.getElementById('e_cal').value) || 0,
    protein: parseFloat(document.getElementById('e_prot').value) || 0,
    carbs: parseFloat(document.getElementById('e_carbs').value) || 0,
    fats: parseFloat(document.getElementById('e_fats').value) || 0,
    meal
  };
  persist();
  closeModal();
  render();
}

function deleteEntry(id) {
  S.entries = S.entries.filter(e => e.id !== id);
  persist();
  render();
}

// ── INIT ──
initHeader();
updateStreak();
render();
</script>

</body>
</html>
