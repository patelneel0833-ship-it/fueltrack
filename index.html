<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FuelTrack"/>
<meta name="theme-color" content="#020617"/>
<title>FuelTrack — Premium Calorie Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:#020617;}
  body{font-family:'DM Sans',-apple-system,sans-serif;color:#f1f5f9;overflow-x:hidden;}
  ::-webkit-scrollbar{width:3px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(99,102,241,0.3);border-radius:99px;}
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
  input,select,button{font-family:'DM Sans',-apple-system,sans-serif;}
  select option{background:#0f172a;}
  @keyframes slideUp{from{opacity:0;transform:translateY(24px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;

// ── CONSTANTS ──
const MEAL_TYPES=[“Breakfast”,“Lunch”,“Dinner”,“Snacks”];
const ACTIVITY_LEVELS=[
{label:“Sedentary”,value:1.2,desc:“Little/no exercise”},
{label:“Light”,value:1.375,desc:“1–3 days/week”},
{label:“Moderate”,value:1.55,desc:“3–5 days/week”},
{label:“Active”,value:1.725,desc:“6–7 days/week”},
{label:“Very Active”,value:1.9,desc:“Hard exercise daily”},
];
const DEFAULT_FOODS=[
{id:“df1”,name:“Roti”,calories:80,protein:2.5,carbs:15,fats:1.5},
{id:“df2”,name:“Dal Tadka”,calories:150,protein:9,carbs:22,fats:3},
{id:“df3”,name:“Paneer Sabji”,calories:220,protein:14,carbs:8,fats:15},
{id:“df4”,name:“Whey Protein”,calories:120,protein:24,carbs:3,fats:1.5},
{id:“df5”,name:“Lassi”,calories:180,protein:6,carbs:28,fats:5},
{id:“df6”,name:“Chicken Breast (100g)”,calories:165,protein:31,carbs:0,fats:3.6},
{id:“df7”,name:“Brown Rice (1 cup)”,calories:216,protein:5,carbs:45,fats:1.8},
{id:“df8”,name:“Oats (50g)”,calories:188,protein:6.5,carbs:32,fats:3.5},
{id:“df9”,name:“Banana”,calories:89,protein:1.1,carbs:23,fats:0.3},
{id:“df10”,name:“Eggs (2)”,calories:148,protein:12,carbs:1,fats:10},
{id:“df11”,name:“Dahi (100g)”,calories:61,protein:3.5,carbs:4.7,fats:3.3},
{id:“df12”,name:“Mixed Veg Curry”,calories:130,protein:4,carbs:18,fats:5},
{id:“df13”,name:“Sambar (1 cup)”,calories:100,protein:4,carbs:16,fats:2},
{id:“df14”,name:“Idli (2 pcs)”,calories:130,protein:4,carbs:26,fats:0.5},
{id:“df15”,name:“Curd Rice”,calories:200,protein:5,carbs:38,fats:3},
];
const TABS=[“Dashboard”,“Log”,“Saved”,“Calc”,“Analytics”,“Goals”];
const TAB_ICONS={Dashboard:“⚡”,Log:“📋”,Saved:“⭐”,Calc:“🔢”,Analytics:“📊”,Goals:“🎯”};
const C={calories:”#f97316”,protein:”#22d3ee”,carbs:”#a78bfa”,fats:”#fb7185”};

// ── HELPERS ──
const store={
get:(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}},
set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};
const today=()=>new Date().toISOString().split(“T”)[0];
const genId=()=>Math.random().toString(36).slice(2,9);
const clamp=(v,a,b)=>Math.min(Math.max(v,a),b);
const calcTDEE=({weight,height,age,gender,activity})=>{
const bmr=gender===“male”?10*weight+6.25*height-5*age+5:10*weight+6.25*height-5*age-161;
return Math.round(bmr*activity);
};

// ── UI ATOMS ──
function MacroPill({label,value,color,unit=“g”}){
return(
<div style={{background:`${color}18`,border:`1px solid ${color}40`,borderRadius:10,padding:“6px 12px”,display:“flex”,flexDirection:“column”,alignItems:“center”,minWidth:64}}>
<span style={{color,fontSize:15,fontWeight:700}}>{value}{unit}</span>
<span style={{color:”#64748b”,fontSize:11,fontWeight:500,marginTop:1}}>{label}</span>
</div>
);
}

function ProgressBar({value,max,color,height=8}){
const pct=max>0?clamp((value/max)*100,0,110):0;
const over=pct>100;
return(
<div style={{background:”#1e293b”,borderRadius:99,height,overflow:“hidden”}}>
<div style={{height:“100%”,width:`${Math.min(pct,100)}%`,background:over?“linear-gradient(90deg,#ef4444,#f97316)”:`linear-gradient(90deg,${color}cc,${color})`,borderRadius:99,transition:“width 0.7s cubic-bezier(0.34,1.56,0.64,1)”,boxShadow:`0 0 10px ${color}55`}}/>
</div>
);
}

function Card({children,style={},onClick,hover=false}){
const[h,setH]=useState(false);
return(
<div onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
style={{background:h&&hover?“rgba(30,41,59,0.95)”:“rgba(15,23,42,0.75)”,backdropFilter:“blur(20px)”,WebkitBackdropFilter:“blur(20px)”,border:h&&hover?“1px solid rgba(99,102,241,0.4)”:“1px solid rgba(255,255,255,0.07)”,borderRadius:20,padding:20,transition:“all 0.25s ease”,transform:h&&hover?“translateY(-2px)”:“translateY(0)”,boxShadow:h&&hover?“0 20px 40px rgba(0,0,0,0.4)”:“0 4px 20px rgba(0,0,0,0.2)”,cursor:onClick?“pointer”:“default”,…style}}>
{children}
</div>
);
}

function Inp({label,type=“text”,value,onChange,placeholder,autoFocus,unit,min}){
const ref=useRef();
useEffect(()=>{if(autoFocus)setTimeout(()=>ref.current?.focus(),80);},[autoFocus]);
return(
<div style={{display:“flex”,flexDirection:“column”,gap:5}}>
{label&&<label style={{color:”#94a3b8”,fontSize:11,fontWeight:600,letterSpacing:“0.06em”,textTransform:“uppercase”}}>{label}</label>}
<div style={{position:“relative”,display:“flex”,alignItems:“center”}}>
<input ref={ref} type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} min={min}
style={{width:“100%”,background:“rgba(30,41,59,0.8)”,border:“1px solid rgba(255,255,255,0.1)”,borderRadius:12,padding:unit?“10px 40px 10px 14px”:“10px 14px”,color:”#f1f5f9”,fontSize:15,outline:“none”,transition:“border-color 0.2s”}}
onFocus={e=>e.target.style.borderColor=“rgba(99,102,241,0.8)”} onBlur={e=>e.target.style.borderColor=“rgba(255,255,255,0.1)”}/>
{unit&&<span style={{position:“absolute”,right:12,color:”#475569”,fontSize:12,fontWeight:600}}>{unit}</span>}
</div>
</div>
);
}

function Sel({label,value,onChange,options}){
return(
<div style={{display:“flex”,flexDirection:“column”,gap:5}}>
{label&&<label style={{color:”#94a3b8”,fontSize:11,fontWeight:600,letterSpacing:“0.06em”,textTransform:“uppercase”}}>{label}</label>}
<select value={value} onChange={e=>onChange(e.target.value)}
style={{background:“rgba(30,41,59,0.8)”,border:“1px solid rgba(255,255,255,0.1)”,borderRadius:12,padding:“10px 14px”,color:”#f1f5f9”,fontSize:14,outline:“none”,cursor:“pointer”}}>
{options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
</select>
</div>
);
}

function Btn({children,onClick,variant=“primary”,small=false,style={},disabled=false}){
const[p,setP]=useState(false);
const V={
primary:{bg:“linear-gradient(135deg,#6366f1,#8b5cf6)”,color:”#fff”,border:“none”,shadow:“0 4px 14px rgba(99,102,241,0.4)”},
danger:{bg:“rgba(239,68,68,0.15)”,color:”#f87171”,border:“1px solid rgba(239,68,68,0.3)”,shadow:“none”},
ghost:{bg:“rgba(255,255,255,0.05)”,color:”#94a3b8”,border:“1px solid rgba(255,255,255,0.08)”,shadow:“none”},
success:{bg:“linear-gradient(135deg,#10b981,#059669)”,color:”#fff”,border:“none”,shadow:“0 4px 14px rgba(16,185,129,0.4)”},
orange:{bg:“linear-gradient(135deg,#f97316,#ea580c)”,color:”#fff”,border:“none”,shadow:“0 4px 14px rgba(249,115,22,0.4)”},
};
const v=V[variant]||V.primary;
return(
<button onClick={onClick} disabled={disabled} onMouseDown={()=>setP(true)} onMouseUp={()=>setP(false)} onMouseLeave={()=>setP(false)}
style={{background:disabled?“rgba(255,255,255,0.05)”:v.bg,color:disabled?”#475569”:v.color,border:v.border,borderRadius:small?10:12,padding:small?“6px 14px”:“10px 20px”,fontSize:small?12:14,fontWeight:600,cursor:disabled?“not-allowed”:“pointer”,transform:p&&!disabled?“scale(0.96)”:“scale(1)”,transition:“all 0.15s ease”,letterSpacing:“0.01em”,boxShadow:disabled?“none”:v.shadow,…style}}>
{children}
</button>
);
}

// ── MEAL SELECTOR ──
function MealPicker({value,onChange}){
return(
<div style={{display:“flex”,gap:6,flexWrap:“wrap”}}>
{MEAL_TYPES.map(m=>(
<button key={m} onClick={()=>onChange(m)}
style={{padding:“6px 14px”,borderRadius:99,border:“none”,background:value===m?“rgba(99,102,241,0.3)”:“rgba(30,41,59,0.6)”,color:value===m?”#a5b4fc”:”#64748b”,cursor:“pointer”,fontSize:13,fontWeight:600,transition:“all 0.2s”}}>
{m}
</button>
))}
</div>
);
}

// ── FOOD ITEM ──
function FoodItem({entry,onDelete,onEdit}){
return(
<div style={{background:“rgba(30,41,59,0.4)”,borderRadius:12,padding:“10px 12px”,marginTop:8,border:“1px solid rgba(255,255,255,0.05)”}}>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“center”}}>
<div style={{flex:1}}>
<div style={{color:”#e2e8f0”,fontWeight:600,fontSize:14}}>{entry.name}</div>
<div style={{display:“flex”,gap:8,marginTop:3,flexWrap:“wrap”}}>
<span style={{color:C.calories,fontSize:12,fontWeight:700}}>{entry.calories} kcal</span>
<span style={{color:”#475569”,fontSize:12}}>P:{entry.protein}g · C:{entry.carbs}g · F:{entry.fats}g</span>
</div>
</div>
<div style={{display:“flex”,gap:4,marginLeft:8}}>
<Btn small variant=“ghost” onClick={()=>onEdit(entry)}>✏️</Btn>
<Btn small variant=“danger” onClick={()=>onDelete(entry.id)}>✕</Btn>
</div>
</div>
</div>
);
}

// ── ADD FOOD MODAL ──
function AddModal({onClose,onAdd,savedFoods,mealType}){
const[mode,setMode]=useState(“manual”);
const[name,setName]=useState(””);
const[calories,setCalories]=useState(””);
const[protein,setProtein]=useState(””);
const[carbs,setCarbs]=useState(””);
const[fats,setFats]=useState(””);
const[meal,setMeal]=useState(mealType||“Breakfast”);
const[search,setSearch]=useState(””);

const allSaved=[…DEFAULT_FOODS,…savedFoods];
const filtered=allSaved.filter(f=>f.name.toLowerCase().includes(search.toLowerCase()));

const fill=(food)=>{setName(food.name);setCalories(String(food.calories));setProtein(String(food.protein));setCarbs(String(food.carbs));setFats(String(food.fats));setMode(“manual”);};
const quickAdd=(food)=>{onAdd({…food,id:genId(),meal,timestamp:Date.now()});onClose();};
const submit=()=>{
if(!name||!calories)return;
onAdd({id:genId(),name,calories:parseFloat(calories)||0,protein:parseFloat(protein)||0,carbs:parseFloat(carbs)||0,fats:parseFloat(fats)||0,meal,timestamp:Date.now()});
onClose();
};

return(
<div onClick={e=>e.target===e.currentTarget&&onClose()}
style={{position:“fixed”,inset:0,zIndex:1000,background:“rgba(2,6,23,0.88)”,backdropFilter:“blur(10px)”,display:“flex”,alignItems:“flex-end”,justifyContent:“center”,padding:“0 0 0 0”}}>
<div style={{background:“rgba(13,20,38,0.99)”,border:“1px solid rgba(255,255,255,0.1)”,borderRadius:“24px 24px 0 0”,width:“100%”,maxWidth:540,maxHeight:“90vh”,overflow:“auto”,boxShadow:“0 -20px 60px rgba(0,0,0,0.7)”,animation:“slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1)”}}>
{/* Handle */}
<div style={{display:“flex”,justifyContent:“center”,padding:“12px 0 0”}}>
<div style={{width:40,height:4,background:“rgba(255,255,255,0.15)”,borderRadius:99}}/>
</div>
<div style={{padding:“16px 20px 0”,display:“flex”,alignItems:“center”,justifyContent:“space-between”}}>
<h3 style={{color:”#f1f5f9”,fontSize:18,fontWeight:700}}>Add Food</h3>
<button onClick={onClose} style={{background:“rgba(255,255,255,0.08)”,border:“none”,color:”#94a3b8”,cursor:“pointer”,fontSize:16,width:30,height:30,borderRadius:99,display:“flex”,alignItems:“center”,justifyContent:“center”}}>✕</button>
</div>
{/* Mode Toggle */}
<div style={{padding:“14px 20px 0”}}>
<div style={{display:“flex”,background:“rgba(30,41,59,0.6)”,borderRadius:12,padding:4,gap:4}}>
{[“manual”,“saved”].map(m=>(
<button key={m} onClick={()=>setMode(m)}
style={{flex:1,padding:“8px 0”,borderRadius:9,border:“none”,background:mode===m?“rgba(99,102,241,0.3)”:“transparent”,color:mode===m?”#a5b4fc”:”#475569”,cursor:“pointer”,fontSize:13,fontWeight:600,transition:“all 0.2s”}}>
{m===“manual”?“✏️ Manual Entry”:“⚡ Quick Add”}
</button>
))}
</div>
</div>
<div style={{padding:20,display:“flex”,flexDirection:“column”,gap:14}}>
<MealPicker value={meal} onChange={setMeal}/>
{mode===“manual”?(
<>
<Inp label="Food Name" value={name} onChange={setName} placeholder="e.g. Chicken Breast" autoFocus/>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:12}}>
<Inp label="Calories" type="number" value={calories} onChange={setCalories} unit="kcal"/>
<Inp label="Protein" type="number" value={protein} onChange={setProtein} unit="g"/>
<Inp label="Carbs" type="number" value={carbs} onChange={setCarbs} unit="g"/>
<Inp label="Fats" type="number" value={fats} onChange={setFats} unit="g"/>
</div>
<Btn onClick={submit} disabled={!name||!calories} style={{width:“100%”,padding:“13px”}}>Add to {meal}</Btn>
</>
):(
<>
<Inp value={search} onChange={setSearch} placeholder="Search foods..." autoFocus/>
<div style={{display:“flex”,flexDirection:“column”,gap:8,maxHeight:300,overflowY:“auto”}}>
{filtered.map(food=>(
<div key={food.id} style={{background:“rgba(30,41,59,0.5)”,border:“1px solid rgba(255,255,255,0.06)”,borderRadius:14,padding:“12px 14px”,display:“flex”,alignItems:“center”,justifyContent:“space-between”,gap:10}}>
<div style={{flex:1}}>
<div style={{color:”#f1f5f9”,fontWeight:600,fontSize:14}}>{food.name}</div>
<div style={{display:“flex”,gap:8,marginTop:3,flexWrap:“wrap”}}>
<span style={{color:C.calories,fontSize:12,fontWeight:700}}>{food.calories} kcal</span>
<span style={{color:”#475569”,fontSize:12}}>P:{food.protein}g C:{food.carbs}g F:{food.fats}g</span>
</div>
</div>
<div style={{display:“flex”,gap:6}}>
<Btn small variant=“ghost” onClick={()=>fill(food)}>Edit</Btn>
<Btn small onClick={()=>quickAdd(food)}>Add</Btn>
</div>
</div>
))}
{filtered.length===0&&<div style={{textAlign:“center”,color:”#475569”,padding:“20px 0”}}>No foods found</div>}
</div>
</>
)}
</div>
</div>
</div>
);
}

// ── EDIT MODAL ──
function EditModal({entry,onClose,onSave}){
const[name,setName]=useState(entry.name);
const[calories,setCalories]=useState(String(entry.calories));
const[protein,setProtein]=useState(String(entry.protein));
const[carbs,setCarbs]=useState(String(entry.carbs));
const[fats,setFats]=useState(String(entry.fats));
const[meal,setMeal]=useState(entry.meal);
return(
<div onClick={e=>e.target===e.currentTarget&&onClose()}
style={{position:“fixed”,inset:0,zIndex:1000,background:“rgba(2,6,23,0.88)”,backdropFilter:“blur(10px)”,display:“flex”,alignItems:“flex-end”,justifyContent:“center”}}>
<div style={{background:“rgba(13,20,38,0.99)”,border:“1px solid rgba(255,255,255,0.1)”,borderRadius:“24px 24px 0 0”,width:“100%”,maxWidth:540,maxHeight:“85vh”,overflow:“auto”,boxShadow:“0 -20px 60px rgba(0,0,0,0.7)”,animation:“slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1)”,padding:24}}>
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“center”,marginBottom:20}}>
<h3 style={{color:”#f1f5f9”,fontWeight:700}}>Edit Entry</h3>
<button onClick={onClose} style={{background:“rgba(255,255,255,0.08)”,border:“none”,color:”#94a3b8”,cursor:“pointer”,fontSize:16,width:30,height:30,borderRadius:99,display:“flex”,alignItems:“center”,justifyContent:“center”}}>✕</button>
</div>
<div style={{display:“flex”,flexDirection:“column”,gap:12}}>
<Inp label="Food Name" value={name} onChange={setName} autoFocus/>
<div style={{display:“grid”,gridTemplateColumns:“1fr 1fr”,gap:12}}>
<Inp label="Calories" type="number" value={calories} onChange={setCalories} unit="kcal"/>
<Inp label="Protein" type="number" value={protein} onChange={setProtein} unit="g"/>
<Inp label="Carbs" type="number" value={carbs} onChange={setCarbs} unit="g"/>
<Inp label="Fats" type="number" value={fats} onChange={setFats} unit="g"/>
</div>
<MealPicker value={meal} onChange={setMeal}/>
<Btn style={{width:“100%”,padding:“13px”}} onClick={()=>{onSave({…entry,name,calories:+calories,protein:+protein,carbs:+carbs,fats:+fats,meal});onClose();}}>Save Changes</Btn>
</div>
</div>
</div>
);
}

// ── DASHBOARD ──
function Dashboard({entries,goals,onOpenModal,onDeleteEntry,onEditEntry,streak}){
const totals=entries.reduce((a,e)=>({calories:a.calories+e.calories,protein:a.protein+e.protein,carbs:a.carbs+e.carbs,fats:a.fats+e.fats}),{calories:0,protein:0,carbs:0,fats:0});
const goalCal=goals.calories||2000;
const goalProt=goals.protein||150;
const remaining=goalCal-totals.calories;
const mealGroups=MEAL_TYPES.reduce((a,m)=>{a[m]=entries.filter(e=>e.meal===m);return a;},{});
const insights=[];
if(totals.protein<goalProt*0.5&&entries.length>0)insights.push({icon:“⚠️”,msg:“Protein intake is low today”,color:”#fbbf24”});
if(totals.calories>goalCal*1.1)insights.push({icon:“🔥”,msg:“You’ve exceeded your calorie goal”,color:”#f87171”});
if(remaining>0&&totals.calories>goalCal*0.8)insights.push({icon:“✅”,msg:“Almost at your calorie goal!”,color:”#34d399”});
if(entries.length===0)insights.push({icon:“📝”,msg:“Start logging your meals today”,color:”#a78bfa”});

return(
<div style={{display:“flex”,flexDirection:“column”,gap:14}}>
{streak>0&&(
<div style={{background:“linear-gradient(135deg,rgba(249,115,22,0.2),rgba(234,88,12,0.1))”,border:“1px solid rgba(249,115,22,0.3)”,borderRadius:16,padding:“12px 18px”,display:“flex”,alignItems:“center”,gap:10}}>
<span style={{fontSize:22}}>🔥</span>
<div>
<div style={{color:”#f97316”,fontWeight:700,fontSize:14}}>{streak} Day Streak!</div>
<div style={{color:”#64748b”,fontSize:12}}>Keep logging daily</div>
</div>
</div>
)}
{/* Main Calorie Card */}
<Card>
<div style={{display:“flex”,alignItems:“center”,justifyContent:“space-between”,marginBottom:16}}>
<div>
<div style={{color:”#64748b”,fontSize:11,fontWeight:600,textTransform:“uppercase”,letterSpacing:“0.06em”}}>Today’s Calories</div>
<div style={{display:“flex”,alignItems:“baseline”,gap:6,marginTop:4}}>
<span style={{color:”#f97316”,fontSize:38,fontWeight:800,lineHeight:1}}>{Math.round(totals.calories)}</span>
<span style={{color:”#475569”,fontSize:15}}>/ {goalCal} kcal</span>
</div>
</div>
<div style={{background:remaining>0?“rgba(34,211,238,0.1)”:“rgba(239,68,68,0.1)”,border:`1px solid ${remaining>0?"rgba(34,211,238,0.3)":"rgba(239,68,68,0.3)"}`,borderRadius:14,padding:“10px 16px”,textAlign:“center”}}>
<div style={{color:remaining>0?”#22d3ee”:”#f87171”,fontSize:20,fontWeight:800}}>{Math.abs(Math.round(remaining))}</div>
<div style={{color:”#475569”,fontSize:11,fontWeight:600}}>{remaining>0?“remaining”:“over”}</div>
</div>

function CalcTab({goals,onUpdateGoals}){
const[weight,setWeight]=useState(String(goals.weight||””));
const[height,setHeight]=useState(String(goals.height||””));
const[age,setAge]=useState(String(goals.age||””));

const[goal,setGoal]=useState(goals.goal||“loss”);
const[result,setResult]=useState(null);
const calc=()=>{
if(!weight||!height||!age)return;
const tdee=calcTDEE({weight:+weight,height:+height,age:+age,gender,activity:+activity});
const adj={loss:-500,maintenance:0,gain:300};
const target=tdee+adj[goal];
const wfl=goal===“loss”?500*7/7700:goal===“gain”?-(300*7/7700):0;
setResult({tdee,target,wfl,protein:Math.round(+weight*2)});
onUpdateGoals({…goals,calories:target,protein:Math.round(+weight*2),weight:+weight,height:+height,age:+age,gender,activity:+activity,goal});
};
return(

<Inp label="Height" type="number" value={height} onChange={setHeight} unit="cm"/>
<Inp label="Age" type="number" value={age} onChange={setAge} unit="yrs"/>
<Sel label=“Gender” value={gender} onChange={setGender} options={[{value:“male”,label:“Male”},{value:“female”,label:“Female”}]}/>
</div>
<div style={{marginTop:12,display:“flex”,flexDirection:“column”,gap:12}}>
<Sel label=“Activity Level” value={activity} onChange={setActivity} options={ACTIVITY_LEVELS.map(a=>({value:String(a.value),label:`${a.label} — ${a.desc}`}))}/>
<Sel label=“Goal” value={goal} onChange={setGoal} options={[{value:“loss”,label:“🔥 Fat Loss (−500 kcal)”},{value:“maintenance”,label:“⚖️ Maintenance”},{value:“gain”,label:“💪 Muscle Gain (+300 kcal)”}]}/>
</div>
<Btn onClick={calc} variant=“orange” style={{marginTop:16,width:“100%”,padding:“13px”}}>Calculate My Goals</Btn>
</Card>
{result&&(
<div style={{display:“flex”,flexDirection:“column”,gap:10}}>
{[
{label:“TDEE (Maintenance)”,value:`${result.tdee} kcal/day`,color:”#a78bfa”,icon:“⚡”},
{label:“Daily Calorie Goal”,value:`${result.target} kcal/day`,color:C.calories,icon:“🎯”},

{label:goal===“loss”?“Est. Weekly Fat Loss”:goal===“gain”?“Est. Weekly Gain”:“Weekly Change”,value:goal===“maintenance”?“0 kg”:`~${Math.abs(result.wfl).toFixed(2)} kg/wk`,color:goal===“loss”?”#34d399”:C.fats,icon:goal===“loss”?“📉”:“📈”},
].map((item,i)=>(
<Card key={i} style={{padding:“14px 18px”}}>

))}

const d=new Date();d.setDate(d.getDate()-(6-i));
const ds=d.toISOString().split(“T”)[0];
const de=allEntries.filter(e=>new Date(e.timestamp).toISOString().split(“T”)[0]===ds);
const cal=Math.round(de.reduce((s,e)=>s+e.calories,0));
const prot=Math.round(de.reduce((s,e)=>s+e.protein,0));
return{date:ds,label:d.toLocaleDateString(“en-US”,{weekday:“short”}),calories:cal,protein:prot,hasData:de.length>0};
});
const maxCal=Math.max(…days.map(d=>d.calories),goalCal,1);

const avg=Math.round(withData.reduce((s,d)=>s+d.calories,0)/(withData.length||1));

))}
</div>
